<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Align: Face & Posture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0D0F14',
              card: '#161A22',
              primary: {
                50: '#f5f3ff',
                100: '#ede9fe',
                200: '#ddd6fe',
                300: '#c4b5fd',
                400: '#a78bfa',
                500: '#8b5cf6',
                600: '#7c3aed',
                700: '#6d28d9',
                800: '#5b21b6',
                900: '#4c1d95',
              },
              secondary: {
                50: '#f0f9ff',
                500: '#0ea5e9',
                600: '#0284c7',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          },
        },
      }
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      body {
        -webkit-tap-highlight-color: transparent;
        background-color: #0D0F14;
        color: #ffffff;
      }

      /* Exercise Animations */
      @keyframes chin-lift {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-15deg); }
      }
      @keyframes chin-tuck {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-15px); }
      }
      @keyframes neck-tilt {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(15deg); }
      }
      @keyframes tongue-pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.9); }
        50% { opacity: 0.8; transform: scale(1.1); }
      }
      @keyframes jaw-slide {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
      }

      .anim-chin-lift { transform-origin: 50% 80%; animation: chin-lift 4s ease-in-out infinite; }
      .anim-chin-tuck { animation: chin-tuck 4s ease-in-out infinite; }
      .anim-neck-tilt { transform-origin: 50% 80%; animation: neck-tilt 5s ease-in-out infinite; }
      .anim-tongue-pulse { transform-origin: 50% 40%; animation: tongue-pulse 3s ease-in-out infinite; }
      .anim-jaw-slide { animation: jaw-slide 5s ease-in-out infinite; }

    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
